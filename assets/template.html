<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Chat Screenshot</title>
<style>
/* === Reset: no body whitespace === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; padding: 0; background: transparent; }

/* =====================================================
   THEME: ChatGPT — mobile dark (#000)
   ===================================================== */
.theme-chatgpt {
  width: 390px;
  background: #000;
  font-family: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
  color: #ececec;
}
.cg-status {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px 6px;
}
.cg-status .cg-time { font-size: 15px; font-weight: 700; }
.cg-status .cg-right { display: flex; gap: 7px; align-items: center; }
.cg-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 16px 10px;
}
.cg-header-left { display: flex; align-items: center; gap: 6px; }
.cg-dot { width: 6px; height: 6px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
.cg-model-name { font-size: 17px; font-weight: 600; }
.cg-arrow { color: #888; font-size: 13px; margin-left: 1px; }
.cg-upgrade {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.08); border-radius: 20px;
  padding: 5px 10px; font-size: 13px;
}
.cg-upgrade-star { color: #f59e0b; }
.cg-more { color: #888; font-size: 18px; letter-spacing: 1px; font-weight: 700; }
.cg-msgs {}
.cg-msg { padding: 16px 16px 0; }
.cg-msg:last-child { padding-bottom: 16px; }
.cg-msg-text { font-size: 15px; line-height: 1.65; color: #ececec; }
.cg-actions { display: flex; gap: 0px; margin-top: 6px; }
/* User block floats right as a unit; text inside stays left-aligned */
.cg-msg-user { display: flex; flex-direction: column; align-items: flex-end; }
.cg-msg-user .cg-msg-text { text-align: left; max-width: 78%; }
.cg-msg-user .cg-actions { justify-content: flex-end; }
.cg-btn { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; color: #3a3a3a; border-radius: 6px; }
.cg-input-wrap { padding: 8px 12px 2px; }
.cg-input-bar {
  background: #222225; border-radius: 26px;
  padding: 10px 10px 8px 14px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 52px;
}
.cg-placeholder { font-size: 15px; color: #555; flex: 1; }
.cg-input-bottom { display: flex; justify-content: space-between; align-items: center; }
.cg-plus-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: #3a3a3d; display: flex; align-items: center; justify-content: center;
  color: #888;
}
.cg-voice-btns { display: flex; gap: 6px; }
.cg-mic-btn { width: 32px; height: 32px; border-radius: 50%; background: #1a1a1d; display: flex; align-items: center; justify-content: center; }
.cg-wave-btn { width: 32px; height: 32px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; }
.cg-notice { text-align: center; font-size: 11px; color: #383838; padding: 5px 16px 14px; }

/* =====================================================
   THEME: Claude — desktop warm dark (#191919)
   ===================================================== */
.theme-claude {
  width: 720px;
  background: #191919;
  font-family: ui-sans-serif, -apple-system, sans-serif;
  color: #e8e4dc;
}
.cl-msgs { padding: 32px 0 28px; }
.cl-msg { padding: 4px 44px; }
.cl-msg-user { display: flex; justify-content: flex-end; margin-bottom: 22px; }
.cl-user-bubble {
  background: #252525; border-radius: 20px;
  padding: 9px 16px; font-size: 15px; color: #e8e4dc;
  display: inline-block; max-width: 58%; line-height: 1.6;
}
.cl-msg-ai { margin-bottom: 6px; }
.cl-ai-text {
  font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
  font-size: 15px; line-height: 1.72; color: #e8e4dc;
  max-width: 600px;
}
.cl-actions { display: flex; gap: 1px; margin-top: 10px; }
.cl-btn { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; color: #404040; border-radius: 4px; }
.cl-star-wrap { padding: 10px 44px 0; }

/* =====================================================
   THEME: DeepSeek — desktop cool dark (#111318)
   ===================================================== */
.theme-deepseek {
  width: 860px;
  background: #111318;
  font-family: ui-sans-serif, -apple-system, sans-serif;
  color: #e0e0e0;
}
.ds-msgs { padding: 24px 0; }
.ds-msg { padding: 0 36px; margin-bottom: 28px; }
.ds-msg-user { display: flex; justify-content: flex-end; }
.ds-user-bubble {
  background: #1c1f28; border-radius: 22px;
  padding: 12px 18px; max-width: 66%;
  font-size: 15px; color: #e0e0e0; line-height: 1.65;
}
.ds-user-actions {
  display: flex; justify-content: flex-end; gap: 2px; margin-top: 5px;
}
.ds-ubtn { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; color: #2e3140; }
.ds-thinking {
  display: flex; align-items: center; gap: 10px;
  border: 1px solid #1b3a5c; border-radius: 10px;
  padding: 9px 14px; margin-bottom: 14px; max-width: 440px;
}
.ds-think-icon { color: #4568dc; display: flex; align-items: center; }
.ds-think-text { color: #4568dc; font-size: 14px; flex: 1; }
.ds-think-arrow { color: #4568dc; font-size: 15px; }
.ds-ai-text { font-size: 15px; line-height: 1.7; color: #e0e0e0; max-width: 720px; }
.ds-actions { display: flex; gap: 1px; margin-top: 10px; color: #2e3140; }
.ds-btn { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; }

/* =====================================================
   THEME: Gemini — desktop near-black (#0d0e12)
   ===================================================== */
.theme-gemini {
  width: 840px;
  background: #0d0e12;
  font-family: "Google Sans", ui-sans-serif, sans-serif;
  color: #e3e3e3;
}
.gm-msgs { padding: 24px 0; }
.gm-msg { padding: 0 44px; margin-bottom: 28px; }
.gm-msg-user { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
.gm-user-icons { display: flex; gap: 4px; }
.gm-uicon { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); }
.gm-user-bubble {
  background: #18191f; border-radius: 22px;
  padding: 12px 18px; max-width: 65%;
  font-size: 15px; color: #e3e3e3; line-height: 1.65;
}
.gm-msg-ai {}
.gm-ai-row { display: flex; align-items: flex-start; gap: 12px; }
.gm-star { flex-shrink: 0; margin-top: 1px; }
.gm-ai-text { font-size: 15px; line-height: 1.7; color: #e3e3e3; }
.gm-actions { display: flex; gap: 0px; margin-top: 10px; padding-left: 34px; color: #252630; }
.gm-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; }

/* =====================================================
   THEME: Grok — desktop pure black (#000)
   ===================================================== */
.theme-grok {
  width: 700px;
  background: #000;
  font-family: ui-sans-serif, sans-serif;
  color: #e8e8e8;
}
.gk-msgs { padding: 28px 0; }
.gk-msg { padding: 0 44px; margin-bottom: 28px; }
.gk-msg-user { display: flex; justify-content: flex-end; }
.gk-user-bubble {
  background: #0e0e0e; border-radius: 22px;
  padding: 12px 18px; max-width: 65%;
  font-size: 15px; color: #e8e8e8; line-height: 1.65;
}
.gk-think-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; color: #444; }
.gk-think-text { font-size: 13px; color: #454545; }
.gk-ai-text { font-size: 15px; line-height: 1.7; color: #e8e8e8; }
.gk-actions { display: flex; gap: 0px; margin-top: 10px; color: #252525; }
.gk-btn { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; }

/* =====================================================
   THEME: 豆包 — desktop light (#fff)
   ===================================================== */
.theme-doubao {
  width: 700px;
  background: #fff;
  font-family: ui-sans-serif, -apple-system, "PingFang SC", sans-serif;
  color: #1d1d1f;
}
.db-msgs { padding: 20px 28px; }
.db-msg { margin-bottom: 20px; }
.db-msg-user { display: flex; justify-content: flex-end; }
.db-user-bubble {
  background: #f0f0f0; border-radius: 14px;
  padding: 10px 14px; max-width: 72%;
  font-size: 15px; color: #1d1d1f; line-height: 1.6;
}
.db-msg-ai {}
.db-ai-text { font-size: 15px; line-height: 1.7; color: #1d1d1f; }
</style>
</head>
<body>
<div id="phone"></div>
<script>
/* ---- Icon SVGs (thin stroke) ---- */
var I = {
  copy:      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
  pencil:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  thumbUp:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.3a2 2 0 002-1.7l1.4-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>',
  thumbDown: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.7a2 2 0 00-2 1.7l-1.4 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.7A2.3 2.3 0 0122 4v7a2.3 2.3 0 01-2.3 2H17"/></svg>',
  refresh:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 102.1-9.4L1 10"/></svg>',
  share:     '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>',
  more:      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="19" cy="12" r="1.2" fill="currentColor"/></svg>',
  moreVert:  '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/><circle cx="12" cy="19" r="1.2" fill="currentColor"/></svg>',
  bulb:      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M15.1 14c.18-.98.65-1.74 1.4-2.5A4.7 4.7 0 0018 8 6 6 0 006 8c0 1 .23 2.23 1.5 3.5A4.6 4.6 0 018.9 14"/></svg>',
  chain:     '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.5.5l3-3a5 5 0 00-7.1-7.1l-1.7 1.7"/><path d="M14 11a5 5 0 00-7.5-.5l-3 3a5 5 0 007.1 7.1l1.7-1.7"/></svg>',
  mic:       '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
  plus:      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
};

/* ---- Brand logos ---- */
var LOGOS = {
  claudeStar: '<svg width="22" height="22" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16 1L17.6 12.2L16 16L14.4 12.2ZM16 31L14.4 19.8L16 16L17.6 19.8ZM1 16L12.2 14.4L16 16L12.2 17.6ZM31 16L19.8 17.6L16 16L19.8 14.4ZM4.69 4.69L12.8 11.8L16 16L11.8 12.8ZM27.31 27.31L19.2 20.2L16 16L20.2 19.2ZM27.31 4.69L20.2 12.8L16 16L19.2 11.8ZM4.69 27.31L11.8 19.2L16 16L12.8 20.2Z" fill="#c97b5a"/></svg>',
  geminiStar: '<svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="gg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><path d="M12 1.5C12 1.5 12.9 8.5 20.5 12C12.9 15.5 12 22.5 12 22.5C12 22.5 11.1 15.5 3.5 12C11.1 8.5 12 1.5 12 1.5Z" fill="url(#gg1)"/></svg>',
  deepseekAtom: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><ellipse cx="12" cy="12" rx="10" ry="4" stroke="#4568dc" stroke-width="1.4"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="#4568dc" stroke-width="1.4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="#4568dc" stroke-width="1.4" transform="rotate(120 12 12)"/><circle cx="12" cy="12" r="2.2" fill="#4568dc"/></svg>',
  grokX: '<svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 4L20 20M20 4L4 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>',
  /* Battery + signal icons for chatgpt status bar */
  battery: '<svg width="24" height="12" viewBox="0 0 24 12"><rect x="0" y="1" width="20" height="10" rx="2" stroke="#aaa" stroke-width="1" fill="none"/><rect x="21" y="4" width="2" height="4" rx="1" fill="#aaa"/><rect x="1" y="2" width="16" height="8" rx="1" fill="#aaa"/></svg>',
  signal:  '<svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="5" width="3" height="7" rx="0.5" fill="#aaa"/><rect x="4.5" y="3" width="3" height="9" rx="0.5" fill="#aaa"/><rect x="9" y="1" width="3" height="11" rx="0.5" fill="#aaa"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#aaa"/></svg>',
};

/* ---- Helpers ---- */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(text) {
  if (!text) return '';
  var lines = esc(text).split('\n');
  var out = []; var inCode = false; var buf = '';
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.indexOf('```') === 0) {
      if (inCode) {
        out.push('<pre style="background:#1a1a1a;color:#ddd;padding:12px;border-radius:8px;font-size:13px;line-height:1.5;margin:8px 0;overflow:auto;white-space:pre"><code>' + buf + '</code></pre>');
        buf = ''; inCode = false;
      } else { inCode = true; }
    } else if (inCode) {
      buf += (buf ? '\n' : '') + line;
    } else if (line === '') {
      out.push('<div style="height:8px"></div>');
    } else {
      line = line.replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.1);padding:1px 5px;border-radius:3px;font-size:0.88em">$1</code>');
      line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      out.push('<div>' + line + '</div>');
    }
  }
  return out.join('');
}

/* ---- Parse params ---- */
var params = new URLSearchParams(location.search);
var platform = params.get('platform') || 'chatgpt';
var stime    = params.get('time') || '9:41';
var ttime    = params.get('thinking_time') || '4';
var msgs = [];
try {
  var raw = params.get('msgs');
  if (raw) msgs = JSON.parse(decodeURIComponent(escape(atob(raw))));
} catch(e) {
  try { msgs = JSON.parse(decodeURIComponent(atob(params.get('msgs') || ''))); } catch(e2) {}
}

var phone = document.getElementById('phone');
phone.className = 'theme-' + platform;

/* =====================================================
   BUILDERS
   ===================================================== */

function buildChatgpt() {
  var msgsHtml = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i]; var text = fmt(m.content);
    if (m.role === 'user') {
      msgsHtml += '<div class="cg-msg cg-msg-user">' +
        '<div class="cg-msg-text">' + text + '</div>' +
        '<div class="cg-actions"><span class="cg-btn">' + I.copy + '</span><span class="cg-btn">' + I.pencil + '</span></div>' +
        '</div>';
    } else {
      msgsHtml += '<div class="cg-msg">' +
        '<div class="cg-msg-text">' + text + '</div>' +
        '<div class="cg-actions">' +
          '<span class="cg-btn">' + I.copy + '</span>' +
          '<span class="cg-btn">' + I.thumbUp + '</span>' +
          '<span class="cg-btn">' + I.thumbDown + '</span>' +
          '<span class="cg-btn">' + I.share + '</span>' +
          '<span class="cg-btn">' + I.refresh + '</span>' +
          '<span class="cg-btn">' + I.more + '</span>' +
        '</div>' +
        '</div>';
    }
  }
  phone.innerHTML =
    '<div class="cg-status">' +
      '<span class="cg-time">' + esc(stime) + '</span>' +
      '<div class="cg-right">' +
        '<span style="font-size:11px;font-weight:600;color:#aaa">5G</span>' +
        LOGOS.signal + LOGOS.battery +
      '</div>' +
    '</div>' +
    '<div class="cg-header">' +
      '<div class="cg-header-left"><span class="cg-dot"></span><span class="cg-model-name">ChatGPT</span><span class="cg-arrow">▾</span></div>' +
      '<div class="cg-upgrade"><span class="cg-upgrade-star">✦</span><span>升级</span></div>' +
      '<div class="cg-more">···</div>' +
    '</div>' +
    '<div class="cg-msgs">' + msgsHtml + '</div>' +
    '<div class="cg-input-wrap">' +
      '<div class="cg-input-bar">' +
        '<div class="cg-placeholder">有问题，尽管问</div>' +
        '<div class="cg-input-bottom">' +
          '<div class="cg-plus-btn">' + I.plus + '</div>' +
          '<div class="cg-voice-btns">' +
            '<div class="cg-mic-btn">' + I.mic + '</div>' +
            '<div class="cg-wave-btn"><svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 6h2M4 3v6M7 1v10M10 4v4M13 2v8M16 5v2" stroke="#000" stroke-width="1.5" stroke-linecap="round"/></svg></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="cg-notice">ChatGPT 也可能会犯错。请核查重要信息。</div>';
}

function buildClaude() {
  var msgsHtml = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i]; var text = fmt(m.content);
    if (m.role === 'user') {
      msgsHtml += '<div class="cl-msg cl-msg-user"><div class="cl-user-bubble">' + text + '</div></div>';
    } else {
      msgsHtml += '<div class="cl-msg cl-msg-ai">' +
        '<div class="cl-ai-text">' + text + '</div>' +
        '<div class="cl-actions">' +
          '<span class="cl-btn">' + I.copy + '</span>' +
          '<span class="cl-btn">' + I.thumbUp + '</span>' +
          '<span class="cl-btn">' + I.thumbDown + '</span>' +
          '<span class="cl-btn">' + I.refresh + '</span>' +
        '</div>' +
        '</div>';
    }
  }
  msgsHtml += '<div class="cl-star-wrap">' + LOGOS.claudeStar + '</div>';
  phone.innerHTML = '<div class="cl-msgs">' + msgsHtml + '</div>';
}

function buildDeepseek() {
  var msgsHtml = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i]; var text = fmt(m.content);
    if (m.role === 'user') {
      msgsHtml += '<div class="ds-msg">' +
        '<div class="ds-msg-user"><div class="ds-user-bubble">' + text + '</div></div>' +
        '<div class="ds-user-actions"><span class="ds-ubtn">' + I.copy + '</span><span class="ds-ubtn">' + I.pencil + '</span></div>' +
        '</div>';
    } else {
      msgsHtml += '<div class="ds-msg">' +
        '<div class="ds-thinking">' +
          '<span class="ds-think-icon">' + LOGOS.deepseekAtom + '</span>' +
          '<span class="ds-think-text">已思考（用时 ' + esc(ttime) + ' 秒）</span>' +
          '<span class="ds-think-arrow">›</span>' +
        '</div>' +
        '<div class="ds-ai-text">' + text + '</div>' +
        '<div class="ds-actions">' +
          '<span class="ds-btn">' + I.copy + '</span>' +
          '<span class="ds-btn">' + I.refresh + '</span>' +
          '<span class="ds-btn">' + I.thumbUp + '</span>' +
          '<span class="ds-btn">' + I.thumbDown + '</span>' +
          '<span class="ds-btn">' + I.share + '</span>' +
        '</div>' +
        '</div>';
    }
  }
  phone.innerHTML = '<div class="ds-msgs">' + msgsHtml + '</div>';
}

function buildGemini() {
  var msgsHtml = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i]; var text = fmt(m.content);
    if (m.role === 'user') {
      msgsHtml += '<div class="gm-msg">' +
        '<div class="gm-msg-user">' +
          '<div class="gm-user-icons"><span class="gm-uicon">' + I.copy + '</span><span class="gm-uicon">' + I.pencil + '</span></div>' +
          '<div class="gm-user-bubble">' + text + '</div>' +
        '</div>' +
        '</div>';
    } else {
      msgsHtml += '<div class="gm-msg gm-msg-ai">' +
        '<div class="gm-ai-row">' +
          '<div class="gm-star">' + LOGOS.geminiStar + '</div>' +
          '<div class="gm-ai-text">' + text + '</div>' +
        '</div>' +
        '<div class="gm-actions">' +
          '<span class="gm-btn">' + I.thumbUp + '</span>' +
          '<span class="gm-btn">' + I.thumbDown + '</span>' +
          '<span class="gm-btn">' + I.refresh + '</span>' +
          '<span class="gm-btn">' + I.copy + '</span>' +
          '<span class="gm-btn">' + I.moreVert + '</span>' +
        '</div>' +
        '</div>';
    }
  }
  phone.innerHTML = '<div class="gm-msgs">' + msgsHtml + '</div>';
}

function buildGrok() {
  var msgsHtml = '';

function buildDoubao() {
  var msgsHtml = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i]; var text = fmt(m.content);
    if (m.role === 'user') {
      msgsHtml += '<div class="db-msg db-msg-user"><div class="db-user-bubble">' + text + '</div></div>';
    } else {
      msgsHtml += '<div class="db-msg db-msg-ai"><div class="db-ai-text">' + text + '</div></div>';

var builders = {
  chatgpt:  buildChatgpt,
  claude:   buildClaude,
  deepseek: buildDeepseek,
  gemini:   buildGemini,
  grok:     buildGrok,
  doubao:   buildDoubao,
};

var fn = builders[platform];
if (fn) fn();
else phone.innerHTML = '<div style="color:red;padding:20px;background:#111">Unknown platform: ' + esc(platform) + '</div>';
</script>
